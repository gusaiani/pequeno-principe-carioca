name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: ./
          remote_path: /var/www/pequeno-principe-carioca.gustavosaiani.com/
          remote_host: poe.ma
          remote_user: root
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
